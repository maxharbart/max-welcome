<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max Harbarth</title>
  <meta name="description" content="Personal homepage of Max Harbarth." />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f4ee;
      --text: #141414;
      --muted: #6d6a64;
      --line: #ded8ce;
      --accent: #2f5d50;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(20,20,20,0.035) 1px, transparent 1px),
        linear-gradient(rgba(20,20,20,0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 56px 56px;
    }

    main {
      width: min(920px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 0;
    }

    .topline {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin-bottom: 44px;
    }

    .intro {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 28px;
      align-items: start;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.3rem, 9vw, 7.5rem);
      line-height: 0.95;
      letter-spacing: -0.075em;
      font-weight: 760;
    }

    .mark {
      width: 82px;
      height: 82px;
      border: 1px solid var(--text);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.08em;
    }

    .summary {
      max-width: 620px;
      margin: 36px 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.28rem);
      line-height: 1.65;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 72px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .item {
      padding: 22px 0;
    }

    .item span {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .item strong {
      font-size: 1.05rem;
      font-weight: 650;
    }

    a {
      color: inherit;
      text-decoration-thickness: 1px;
      text-underline-offset: 5px;
    }

    a:hover { color: var(--accent); }

    footer {
      margin-top: 44px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11110f;
        --text: #f4efe6;
        --muted: #a39b90;
        --line: #34312c;
        --accent: #9ed0bd;
      }

      body {
        background:
          linear-gradient(90deg, rgba(244,239,230,0.035) 1px, transparent 1px),
          linear-gradient(rgba(244,239,230,0.035) 1px, transparent 1px),
          var(--bg);
      }
    }

    @media (max-width: 720px) {
      main { width: min(100% - 28px, 920px); padding: 44px 0; }
      .intro { grid-template-columns: 1fr; }
      .mark { width: 64px; height: 64px; order: -1; }
      .details { grid-template-columns: 1fr; gap: 0; margin-top: 52px; }
      .item + .item { border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main>
    <div class="topline" aria-hidden="true"></div>

    <section class="intro" aria-label="Introduction">
      <div>
        <h1>Max<br />Harbarth</h1>
        <p class="summary">
          QA engineer and builder of practical software experiments. I work with testing, automation, mobile apps, backend tools, and small web projects.
        </p>
      </div>
      <div class="mark" aria-label="MH monogram">MH</div>
    </section>

    <section class="details" aria-label="Personal homepage details">
      <div class="item">
        <span>Focus</span>
        <strong>QA · Automation · Web</strong>
      </div>
      <div class="item">
        <span>Location</span>
        <strong>Poland</strong>
      </div>
      <div class="item">
        <span>GitHub</span>
        <strong><a href="https://github.com/maxharbart">@maxharbart</a></strong>
      </div>
    </section>

    <footer>
      Personal homepage · <a href="https://github.com/maxharbart/max-welcome">source</a>
    </footer>
  </main>
</body>
</html>
